 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <h1>🌤 Weather App</h1>

    <div class="search">
        <input type="text" id="locationInput" placeholder="Enter city">
        <button onclick="getWeather()">Search</button>
    </div>

    <!-- CURRENT WEATHER -->
    <div class="current">
        <h2 id="city">🌍City</h2>

        <div class="main-temp" id="temp">🌡Temp°C</div>

        <div id="desc">Condition</div>

        <div class="stats">
            <p>💧 Humidity:<span id="humidity"></span></p>
            <p>🌬 Wind:<span id="wind"></span></p>
            <p>🔵 Pressure:<span id="pressure"></span></p>
        </div>
    </div>

    <h3>📅 Forecast</h3>
    <div id="forecast"></div>

</div>

<script src="script.js"></script>
</body>
</html>
